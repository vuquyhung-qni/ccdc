<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông tin CCDC – Chi cục Hải quan khu vực VIII</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0d2340;
  --navy-light:#1e4d80;
  --gold:#c9a84c;
  --bg:#eaf0f8;
  --text:#1a2a3a;
  --muted:#5a7080;
  --border:#dde4ec;
  --shadow:0 2px 14px rgba(13,35,64,.09);
  --r:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Be Vietnam Pro",Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hd{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-light) 100%);padding:16px 14px;position:relative;overflow:hidden;}
.hd::before{content:"";position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:rgba(201,168,76,.13);}
.hd-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;min-height:62px;position:relative;z-index:2;gap:10px;padding-left:18px;}
.hd-logo{width:65px;height:65px;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 5px rgba(0,0,0,.4));}
.hd-text{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.hd-subtitle{font-size:clamp(0.85rem,3.8vw,1.35rem);font-weight:400;color:rgba(255,255,255,0.85);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px;}
.hd-title{font-size:clamp(0.85rem,3.8vw,1.35rem);font-weight:800;letter-spacing:0.5px;text-transform:uppercase;color:#fff;white-space:nowrap;}
.main{max-width:900px;margin:0 auto;padding:16px 12px 28px;}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);padding:18px;}
.title{font-size:1.35rem;font-weight:800;color:var(--navy-light);text-transform:uppercase;border-bottom:3px solid var(--navy-light);padding-bottom:10px;margin-bottom:16px;}
.row{margin-bottom:12px;line-height:1.55;font-size:1rem;}
.label{font-weight:800;color:#1a2a3a;}
.value{color:#0057b8;font-weight:700;}
.asset-code{color:#0057b8;font-weight:800;}
.section{margin-top:18px;padding-top:14px;border-top:1px dashed var(--border);}
.link{color:#0057b8;font-weight:800;text-decoration:none;border-bottom:1px dashed #0057b8;}
.link:hover{color:#a87c20;border-bottom-color:#a87c20;}
.footer{margin-top:22px;text-align:center;font-size:.82rem;color:var(--muted);}
.loading{text-align:center;padding:40px 20px;color:var(--muted);}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid var(--border);border-top-color:var(--navy-light);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#fff3f3;border:1.5px solid #f5c6c6;border-radius:var(--r);padding:20px;text-align:center;color:#c0392b;font-weight:600;}
@media(max-width:600px){
  .hd-logo{width:42px;height:42px;}
  .card{padding:16px;}
  .title{font-size:1.15rem;}
  .row{font-size:.95rem;}
  .hd-title{white-space:normal;}
}
</style>
</head>

<script>
// =============================================
// CẤU HÌNH: Thay URL Apps Script CCDC của bạn vào đây
// =============================================
const API_URL = 'https://script.google.com/macros/s/AKfycbxOI-p7e8Wz83pYcTPM7-Pnaythwpvu3HxPh_twTgBE68Mmnk1AgAJqhji7P5HWjWkGSQ/exec';
// =============================================

var _hosoUrl = '';

function xemHoSo(url) {
  _hosoUrl = url;
  document.getElementById('modal-pwd').value = '';
  document.getElementById('modal-err').textContent = '';
  var overlay = document.getElementById('modal-overlay');
  overlay.style.display = 'flex';
  setTimeout(function(){ document.getElementById('modal-pwd').focus(); }, 100);
}
function dongModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}
function xacNhan() {
  if (document.getElementById('modal-pwd').value === 'Hqkv8@2026') {
    dongModal();
    window.open(_hosoUrl, '_blank');
  } else {
    document.getElementById('modal-err').textContent = '❌ Mật khẩu không đúng, vui lòng thử lại.';
    document.getElementById('modal-pwd').select();
  }
}
document.getElementById('modal-overlay').addEventListener('click', function(e){
  if (e.target === this) dongModal();
});

function r(v) { return v || ''; }
function has(v) { return v && String(v).trim() !== ''; }

function renderCCDC(a) {
  // Kiểm tra có dữ liệu bổ sung không
  var hasExtra = has(a['Nguồn gốc']) || has(a['Đơn vị cung cấp']) || has(a['Hồ sơ CCDC']) || has(a['Thời hạn bảo hành']) || has(a['Thông tin bảo hành']);

  var extraSection = '';
  if (hasExtra) {
    extraSection = '<div class="section">'
      + (has(a['Nguồn gốc'])          ? '<div class="row"><span class="label">Nguồn gốc:</span> <span class="value">' + r(a['Nguồn gốc']) + '</span></div>' : '')
      + (has(a['Đơn vị cung cấp'])    ? '<div class="row"><span class="label">Đơn vị cung cấp:</span> <span class="value">' + r(a['Đơn vị cung cấp']) + '</span></div>' : '')
      + (has(a['Thời hạn bảo hành'])  ? '<div class="row"><span class="label">Thời hạn bảo hành:</span> <span class="value">' + r(a['Thời hạn bảo hành']) + '</span></div>' : '')
      + (has(a['Thông tin bảo hành']) ? '<div class="row"><span class="label">Thông tin bảo hành:</span> <span class="value">' + r(a['Thông tin bảo hành']) + '</span></div>' : '')
      + (has(a['Hồ sơ CCDC'])         ? '<div class="row"><span class="label">Hồ sơ CCDC:</span> <a class="link" href="#" onclick=\'xemHoSo("' + a['Hồ sơ CCDC'] + '");return false;\'>Xem hồ sơ CCDC</a></div>' : '')
      + '</div>';
  }

  document.getElementById('app').innerHTML =
    '<div class="card">'
    + '<div class="title">Thông tin công cụ dụng cụ</div>'
    + '<div class="row"><span class="label">Tên CCDC:</span> <span class="value">' + r(a['TenCCDC']) + '</span></div>'
    + (has(a['TenCCDC_daydu']) && a['TenCCDC_daydu'] !== a['TenCCDC'] ? '<div class="row"><span class="label">Tên đầy đủ:</span> <span class="value">' + r(a['TenCCDC_daydu']) + '</span></div>' : '')
    + (has(a['NhomCCDC'])      ? '<div class="row"><span class="label">Nhóm CCDC:</span> <span class="value">' + r(a['NhomCCDC']) + '</span></div>' : '')
    + '<div class="row"><span class="label">Mã CCDC:</span> <span class="value asset-code">' + r(a['MaCCDC']) + '</span></div>'
    + (has(a['DONVISD'])       ? '<div class="row"><span class="label">Đơn vị sử dụng:</span> <span class="value">' + r(a['DONVISD']) + '</span></div>' : '')
    + (has(a['DonViSD_2024'])  ? '<div class="row"><span class="label">Đơn vị SD (2024):</span> <span class="value">' + r(a['DonViSD_2024']) + '</span></div>' : '')
    + (has(a['NguyenGia'])     ? '<div class="row"><span class="label">Nguyên giá (đồng):</span> <span class="value">' + r(a['NguyenGia']) + '</span></div>' : '')
    + (has(a['SonamSD'])       ? '<div class="row"><span class="label">Số năm sử dụng:</span> <span class="value">' + r(a['SonamSD']) + '</span></div>' : '')
    + (has(a['NamSD'])         ? '<div class="row"><span class="label">Năm sử dụng:</span> <span class="value">' + r(a['NamSD']) + '</span></div>' : '')
    + (has(a['TinhtrangCCDC']) ? '<div class="row"><span class="label">Tình trạng CCDC:</span> <span class="value">' + r(a['TinhtrangCCDC']) + '</span></div>' : '')
    + extraSection
    + '<div class="footer">Chi cục Hải quan khu vực VIII</div>'
    + '</div>';
}

var params = new URLSearchParams(window.location.search);
var assetId = (params.get('id') || '').trim();

if (!assetId) {
  document.getElementById('app').innerHTML = '<div class="error-box">⚠️ Thiếu mã CCDC. Vui lòng quét lại mã QR.</div>';
} else {
  // Dùng JSONP để tránh lỗi CORS
  var cbName = 'cb_' + Date.now();
  window[cbName] = function(data) {
    delete window[cbName];
    document.getElementById('jsonp-script').remove();
    if (data.error) {
      document.getElementById('app').innerHTML = '<div class="error-box">❌ ' + data.error + '</div>';
    } else {
      renderCCDC(data);
    }
  };
  var s = document.createElement('script');
  s.id = 'jsonp-script';
  s.onerror = function() {
    document.getElementById('app').innerHTML = '<div class="error-box">❌ Không thể kết nối máy chủ. Vui lòng thử lại.</div>';
  };
  s.src = API_URL + '?id=' + encodeURIComponent(assetId) + '&callback=' + cbName;
  document.head.appendChild(s);
}
</script>
</body>
</html>
